<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>HSD .dat Viewer</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                font-family: monospace;
                font-size: 13px;
                background: #0d1117;
                color: #c9d1d9;
                display: flex;
                flex-direction: column;
                height: 100vh;
            }
            #toolbar {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 8px 12px;
                background: #161b22;
                border-bottom: 1px solid #30363d;
                flex-shrink: 0;
            }
            #toolbar label {
                color: #8b949e;
            }
            #fileInput {
                color: #c9d1d9;
            }
            #dropHint {
                margin-left: auto;
                color: #484f58;
                font-size: 11px;
            }
            #main {
                display: flex;
                flex: 1;
                min-height: 0;
            }
            #sidebar {
                width: 300px;
                flex-shrink: 0;
                border-right: 1px solid #30363d;
                overflow-y: auto;
                padding: 8px;
            }
            #detail {
                flex: 1;
                overflow-y: auto;
                padding: 12px;
            }
            /* tree */
            .tree-root {
                margin-bottom: 2px;
            }
            .tree-node {
                cursor: pointer;
                padding: 2px 4px;
                border-radius: 3px;
                display: flex;
                align-items: baseline;
                gap: 4px;
                user-select: none;
            }
            .tree-node:hover {
                background: #21262d;
            }
            .tree-node.selected {
                background: #1f6feb33;
            }
            .tree-toggle {
                color: #484f58;
                width: 10px;
                display: inline-block;
            }
            .tree-label {
                color: #58a6ff;
            }
            .tree-label.unnamed {
                color: #484f58;
            }
            .tree-offset {
                color: #3d444d;
                font-size: 11px;
            }
            .tree-children {
                margin-left: 14px;
                border-left: 1px solid #21262d;
                margin-left: 16px;
                padding-left: 4px;
            }
            /* detail panel */
            #detail h2 {
                color: #58a6ff;
                margin-bottom: 10px;
                font-size: 14px;
            }
            .section {
                margin-bottom: 14px;
            }
            .section-title {
                color: #8b949e;
                font-size: 11px;
                text-transform: uppercase;
                letter-spacing: 0.05em;
                margin-bottom: 4px;
                border-bottom: 1px solid #21262d;
                padding-bottom: 2px;
            }
            table {
                width: 100%;
                border-collapse: collapse;
            }
            td {
                padding: 2px 6px;
                vertical-align: top;
            }
            td:first-child {
                color: #8b949e;
                width: 130px;
                white-space: nowrap;
            }
            td:last-child {
                color: #e6edf3;
                word-break: break-all;
            }
            tr:hover td {
                background: #161b22;
            }
            .badge {
                display: inline-block;
                padding: 1px 5px;
                border-radius: 3px;
                font-size: 10px;
                margin-right: 3px;
            }
            .badge-geo {
                background: #1f4f2a;
                color: #3fb950;
            }
            .badge-tex {
                background: #1a3a5c;
                color: #58a6ff;
            }
            .badge-mount {
                background: #2d2016;
                color: #d29922;
            }
            .hex {
                color: #6e7681;
            }
            #empty {
                color: #484f58;
                padding: 20px;
            }
        </style>
    </head>
    <body>
        <div id="toolbar">
            <label>Load .dat file:</label>
            <input type="file" id="fileInput" accept=".dat" />
            <span id="dropHint">or drag &amp; drop onto the page</span>
        </div>

        <div id="main">
            <div id="sidebar"><div id="empty">No file loaded.</div></div>
            <div id="detail"></div>
        </div>

        <script type="module" src="./parser.ts"></script>
    </body>
</html>
